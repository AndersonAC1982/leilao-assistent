services:
  postgres:
    image: postgres:16-alpine
    container_name: leilaoauto-postgres
    environment:
      POSTGRES_DB: leilaoauto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - leilaoauto-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d leilaoauto"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/LeilaoAuto.Api/Dockerfile
    container_name: leilaoauto-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=leilaoauto;Username=postgres;Password=postgres
      Jwt__Issuer: LeilaoAuto.Api
      Jwt__Audience: LeilaoAuto.Web
      Jwt__SecretKey: LEILAOAUTO__JWT__THIS_IS_A_LONG_SECRET_KEY_FOR_DEVELOPMENT_2026
      Jwt__ExpiresMinutes: 180
      Cors__AllowedOrigins__0: http://localhost:4200
      Cors__AllowedOrigins__1: http://127.0.0.1:4200
      Cors__AllowedOrigins__2: http://localhost:4300
      Cors__AllowedOrigins__3: http://127.0.0.1:4300
      Http__UseHttpsRedirection: "false"
      Fipe__Enabled: "true"
      Fipe__BaseUrl: https://brasilapi.com.br
      Fipe__PriceByCodeEndpoint: /api/fipe/preco/v1/{code}
      Fipe__UseEstimatedFallback: "true"
      Billing__Provider: Fake
      Billing__SuccessUrl: http://localhost:4200/billing?checkout=success
      Billing__CancelUrl: http://localhost:4200/billing?checkout=cancel
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: backend/LeilaoAuto.Workers/Dockerfile
    container_name: leilaoauto-worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=leilaoauto;Username=postgres;Password=postgres
      Worker__Enabled: "true"
      Worker__SyncIntervalSeconds: 120
      Worker__ConnectorRetryCount: 3
      Worker__ConnectorRetryDelaySeconds: 2
      Worker__RunOnStartup: "true"
      AuctionProviders__Primary__MockMode: "false"
      Fipe__Enabled: "true"
      Fipe__BaseUrl: https://brasilapi.com.br
      Fipe__PriceByCodeEndpoint: /api/fipe/preco/v1/{code}
      Fipe__UseEstimatedFallback: "true"
      Billing__Provider: Fake
      Billing__SuccessUrl: http://localhost:4200/billing?checkout=success
      Billing__CancelUrl: http://localhost:4200/billing?checkout=cancel

  # Optional frontend container. Enable with: docker compose --profile frontend up --build
  web:
    profiles: ["frontend"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: leilaoauto-web
    depends_on:
      api:
        condition: service_started
    ports:
      - "4200:80"

volumes:
  leilaoauto-postgres-data:
