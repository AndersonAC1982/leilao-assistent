<section class="page">
  <h2>Configurações</h2>
  <p>Estrutura inicial para preferências do usuário e alertas.</p>

  <form [formGroup]="form" class="grid">
    <label>
      Fuso horário
      <input formControlName="timezone" />
    </label>

    <label>
      E-mail para notificação
      <input formControlName="notificationEmail" type="email" />
    </label>

    <label>
      Limite para alerta de oportunidade
      <input formControlName="alertThreshold" type="number" min="0" max="100" />
    </label>

    <button type="button" (click)="save()">Salvar rascunho</button>
  </form>

  <p class="todo">TODO: conectar API de configurações e fluxo de validação.</p>
</section>
