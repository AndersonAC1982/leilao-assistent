<section class="page">
  <h2>Settings</h2>
  <p>Configuration scaffold for user preferences and alerts.</p>

  <form [formGroup]="form" class="grid">
    <label>
      Timezone
      <input formControlName="timezone" />
    </label>

    <label>
      Notification email
      <input formControlName="notificationEmail" type="email" />
    </label>

    <label>
      Opportunity alert threshold
      <input formControlName="alertThreshold" type="number" min="0" max="100" />
    </label>

    <button type="button" (click)="save()">Save draft</button>
  </form>

  <p class="todo">TODO: connect settings API and validation flow.</p>
</section>
