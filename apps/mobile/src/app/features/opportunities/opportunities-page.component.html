<section class="page">
  <header>
    <h2>Oportunidades</h2>
    <button type="button" (click)="reload()" [disabled]="loading()">Atualizar</button>
  </header>

  @if (loading()) {
    <la-loading-state message="Carregando oportunidades..." />
  } @else if (cards().length === 0) {
    <la-empty-state title="Sem resultados" message="Nenhuma oportunidade disponivel agora." />
  } @else {
    <div class="grid">
      @for (card of cards(); track card.title + card.source + card.dateUtc) {
        <la-opportunity-card [item]="card" />
      }
    </div>
  }
</section>
