<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MultiLeilao</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="panel">
      <section class="section section-header">
        <div>
          <p class="brand-eyebrow">Scanner operacional</p>
          <h1>MultiLeilao</h1>
          <p class="subtitle">Abra, busque e encontre oportunidades em segundos.</p>
        </div>
      </section>

      <section class="section">
        <h2>Login</h2>
        <form id="login-form" class="form-grid">
          <label for="email-input">E-mail</label>
          <input id="email-input" type="email" placeholder="seu@email.com" autocomplete="username" required />

          <label for="password-input">Senha</label>
          <input id="password-input" type="password" placeholder="Sua senha" autocomplete="current-password" required />

          <p id="api-status" class="muted">Conexăo: verificando...</p>

          <details id="api-advanced-box" class="advanced-box">
            <summary>Ajustes de conexăo (avançado)</summary>

            <label for="api-base-input">Endpoint da API</label>
            <input id="api-base-input" type="text" placeholder="http://localhost:8080/api" autocomplete="off" />

            <div class="row-actions two-actions">
              <button id="test-api-button" class="btn btn-ghost" type="button">Testar conexăo</button>
              <button id="detect-api-button" class="btn btn-ghost" type="button">Autodetectar</button>
            </div>
          </details>

          <button class="btn btn-primary" type="submit">Entrar</button>
        </form>

        <div id="session-view" class="session-row hidden">
          <p id="session-email" class="muted"></p>
          <button id="logout-button" class="btn btn-ghost" type="button">Sair</button>
        </div>
      </section>

      <section class="section">
        <h2>Busca rápida</h2>
        <div class="form-grid">
          <label for="category-input">Tipo de leilăo</label>
          <select id="category-input">
            <option value="all">Todos</option>
            <option value="vehicles">Veículos</option>
            <option value="real_estate">Imóveis</option>
          </select>

          <label for="region-scope-input">Onde buscar</label>
          <select id="region-scope-input">
            <option value="BR">Brasil</option>
            <option value="SP">SP</option>
          </select>

          <label for="search-input">O que vocę procura?</label>
          <input id="search-input" type="text" placeholder="Ex: apartamento, carro, lote de estoque" />

          <button id="run-now-button" class="btn btn-primary" type="button">Buscar oportunidades</button>
          <button id="toggle-advanced-button" class="btn btn-ghost" type="button" aria-expanded="false">
            Modo avançado
          </button>

          <div id="advanced-filters-panel" class="advanced-panel hidden">
            <label for="advanced-category-input">Categoria detalhada</label>
            <select id="advanced-category-input">
              <option value="all">Todas</option>
              <option value="vehicles">Veículos</option>
              <option value="real_estate">Imóveis</option>
              <option value="machines">Máquinas e Equipamentos</option>
              <option value="materials">Materiais / Estoque</option>
              <option value="scrap">Sucatas</option>
              <option value="judicial">Judicial</option>
              <option value="extrajudicial">Extrajudicial</option>
              <option value="misc">Diversos</option>
            </select>

            <label>Sites de leilăo</label>
            <div id="sources-list" class="source-list"></div>

            <label for="score-input">Score mínimo</label>
            <input id="score-input" type="number" min="0" max="100" value="20" />

            <label for="max-price-input">Faixa de preço máxima (opcional)</label>
            <input id="max-price-input" type="number" min="0" step="0.01" placeholder="Ex: 80000" />

            <label for="region-advanced-input">Regiăo / UF detalhada (opcional)</label>
            <input id="region-advanced-input" type="text" maxlength="10" placeholder="Ex: RJ, MG, DF" />

            <label>Contexto da aba</label>
            <p id="tab-context" class="muted">Sem contexto da aba.</p>
            <button id="use-domain-button" class="btn btn-ghost" type="button">Usar domínio atual como fonte</button>

            <div class="row-actions two-actions">
              <button id="apply-filters-button" class="btn btn-primary" type="button">Aplicar</button>
              <button id="save-settings-button" class="btn btn-ghost" type="button">Salvar preferęncias</button>
            </div>
          </div>
        </div>
      </section>

      <section class="section section-status">
        <p id="scan-status-text" class="muted status-text">Aguardando login</p>
        <div id="status-grid" class="status-grid"></div>
      </section>

      <section class="section">
        <div class="title-row">
          <h2>Oportunidades</h2>
          <span id="opportunities-count" class="count">0</span>
        </div>
        <div id="opportunities-list" class="list"></div>
      </section>

      <section class="section">
        <h2>Histórico</h2>
        <div id="history-list" class="list"></div>
      </section>

      <p id="feedback" class="feedback"></p>
    </main>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
