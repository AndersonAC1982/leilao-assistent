<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEILAOAUTO</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="shell">
      <header class="panel-header card">
        <div>
          <p class="eyebrow">LEILAOAUTO</p>
          <h1>Assistente Operacional</h1>
        </div>
        <button id="run-now-button" class="button primary" type="button">Rodar agora</button>
      </header>

      <section class="card auth-card">
        <div class="section-title">
          <h2>Login</h2>
        </div>
        <form id="login-form" class="auth-form">
          <input id="email-input" type="email" placeholder="E-mail" autocomplete="username" required />
          <input id="password-input" type="password" placeholder="Senha" autocomplete="current-password" required />
          <button class="button primary" type="submit">Entrar</button>
        </form>
        <div id="session-view" class="session-row hidden">
          <p id="session-email" class="muted"></p>
          <button id="logout-button" class="button ghost" type="button">Sair</button>
        </div>
      </section>

      <section class="card">
        <div class="section-title">
          <h2>Contexto da aba</h2>
          <button id="use-domain-button" class="button ghost compact" type="button">Usar dominio</button>
        </div>
        <p id="tab-context" class="muted">Sem contexto da aba.</p>
      </section>

      <section class="card">
        <div class="section-title">
          <h2>Status</h2>
        </div>
        <div id="status-grid" class="status-grid"></div>
      </section>

      <section class="card">
        <div class="section-title">
          <h2>Filtros</h2>
        </div>
        <div class="filters-grid">
          <input id="search-input" type="text" placeholder="Busca geral" />
          <input id="source-input" type="text" placeholder="Fonte" />
          <input id="score-input" type="number" min="0" max="100" value="60" placeholder="Score minimo" />
          <select id="type-input">
            <option value="">Tipo (todos)</option>
            <option value="1">Carro</option>
            <option value="2">Moto</option>
            <option value="3">Caminhao</option>
            <option value="4">Utilitario</option>
            <option value="5">Outro</option>
          </select>
          <input id="region-input" type="text" maxlength="2" placeholder="UF" />
        </div>
        <div class="actions-row">
          <button id="apply-filters-button" class="button primary" type="button">Aplicar</button>
          <button id="save-settings-button" class="button ghost" type="button">Salvar</button>
        </div>
      </section>

      <section class="card">
        <div class="section-title">
          <h2>Oportunidades</h2>
          <span id="opportunities-count" class="counter">0</span>
        </div>
        <div id="opportunities-list" class="list"></div>
      </section>

      <section class="card">
        <div class="section-title">
          <h2>Historico</h2>
        </div>
        <div id="history-list" class="list"></div>
      </section>

      <p id="feedback" class="feedback"></p>
    </main>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
