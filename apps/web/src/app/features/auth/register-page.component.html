<main class="auth-shell">
  <section class="auth-card">
    <h1>Criar conta</h1>
    <p>Comece a monitorar até 4 veículos no seu workspace do LEILAOAUTO.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        E-mail
        <input type="email" formControlName="email" placeholder="voce@exemplo.com" />
      </label>

      <label>
        Senha
        <input type="password" formControlName="password" placeholder="Pelo menos 8 caracteres" />
      </label>

      <label>
        Confirmar senha
        <input type="password" formControlName="confirmPassword" placeholder="Repita a senha" />
      </label>

      <div class="actions">
        <button type="submit" [disabled]="loading()">Criar conta</button>
      </div>
    </form>

    <p class="link-text">
      Já possui cadastro?
      <a routerLink="/login">Entrar</a>
    </p>

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }
  </section>
</main>
