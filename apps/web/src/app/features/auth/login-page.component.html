<main class="auth-shell">
  <section class="auth-card">
    <h1>LEILAOAUTO</h1>
    <p>Entre para gerenciar seus veículos monitorados e oportunidades.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        E-mail
        <input type="email" formControlName="email" placeholder="voce@exemplo.com" />
      </label>

      <label>
        Senha
        <input type="password" formControlName="password" placeholder="Mínimo de 8 caracteres" />
      </label>

      <div class="actions">
        <button type="submit" [disabled]="loading()">Entrar</button>
      </div>
    </form>

    <p class="link-text">
      Ainda não tem conta?
      <a routerLink="/register">Criar conta</a>
    </p>

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }
  </section>
</main>
